<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>F2 Gestão 4.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
color:#333;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#2c5364;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#203a43;
}

.dashboard{
display:none;
padding:20px;
width:100%;
height:100vh;
background:#f4f6f9;
color:#333;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#2c5364;
color:white;
padding:15px;
border-radius:10px;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h2>F2 INFORMÁTICA</h2>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="dashboard" id="painel">

<div class="topbar">
<div>
<strong>F2 Gestão 4.0 Empresarial</strong>
</div>
<button onclick="logout()" style="width:auto;background:red;">Sair</button>
</div>

<div class="card">
<h3>Bem-vindo, Kenanias 👋</h3>
<p>Sistema pronto para integrar o financeiro e relatórios empresariais.</p>
</div>

</div>

<script>

// ===== LOGIN FIXO =====
const usuarioPadrao = "admin";
const senhaPadrao = "1234";

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === usuarioPadrao && p === senhaPadrao){
localStorage.setItem("f2logado","sim");
mostrarSistema();
}else{
alert("Usuário ou senha incorretos");
}
}

function logout(){
localStorage.removeItem("f2logado");
location.reload();
}

function mostrarSistema(){
document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";
}

if(localStorage.getItem("f2logado") === "sim"){
mostrarSistema();
}

</script>

</body>
</html>
