<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F2 GESTÃO PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --green: #10b981; --purple: #8b5cf6; --red: #ef4444; --text: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-transform: uppercase; }
        .container { max-width: 450px; margin: auto; }

        .brand { text-align: center; margin-bottom: 20px; }
        .brand img { max-width: 140px; filter: brightness(1.2); }

        .dash-main { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px; border-radius: 24px; border: 1px solid #334155;
            text-align: center; margin-bottom: 20px;
        }
        .dash-main small { color: #94a3b8; font-size: 10px; letter-spacing: 1px; }
        .dash-main h1 { margin: 10px 0; font-size: 32px; color: var(--green); }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .stat-card b { display: block; font-size: 16px; margin-top: 5px; }

        /* Chart Area */
        .chart-box { background: var(--card); padding: 15px; border-radius: 24px; margin-bottom: 20px; height: 220px; border: 1px solid #334155; }

        .btn { 
            background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 16px; width: 100%; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px;
        }
        .btn-outline { background: transparent; border: 1px solid #334155; margin-bottom: 10px; }

        .form { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 20px; border: 1px solid #334155; }
        input, select { 
            width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; 
            border: 1px solid #334155; background: #0f172a; color: white; font-weight: bold;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 12px; background: #334155; font-size: 11px; font-weight: bold; }
        .tab.active-v { background: var(--green); }
        .tab.active-s { background: var(--purple); }

        .item { 
            background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent);
        }
        .item-info b { font-size: 14px; }
        .item-info small { color: #94a3b8; display: block; margin: 3px 0; }
        .btn-del { background: #450a0a; color: var(--red); border: none; padding: 10px; border-radius: 12px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 90%; border-radius: 24px; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand"><img src="Logo.png" alt="F2"></div>

    <div class="dash-main">
        <small id="label-periodo">LUCRO LÍQUIDO (HOJE)</small>
        <h1 id="rel-lucro">R$ 0,00</h1>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
            <button onclick="setPeriodo('dia', this)" id="btn-dia" style="background:none; border:none; color:var(--green); font-size:11px; font-weight:bold; cursor:pointer">HOJE</button>
            <button onclick="setPeriodo('mes', this)" id="btn-mes" style="background:none; border:none; color:white; font-size:11px; cursor:pointer; opacity:0.6">MÊS</button>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="meuGrafico"></canvas>
    </div>

    <div class="stats">
        <div class="stat-card" style="border-bottom: 3px solid var(--green)">
            <small>PEÇAS</small><b id="rel-v-bruto">R$ 0,00</b>
        </div>
        <div class="stat-card" style="border-bottom: 3px solid var(--purple)">
            <small>SERVIÇOS</small><b id="rel-s-bruto">R$ 0,00</b>
        </div>
    </div>

    <button class="btn btn-outline" onclick="abrirClientes()">
        <i data-lucide="users"></i> GERIR CLIENTES
    </button>
    
    <button class="btn btn-outline" onclick="exportarCSV()" style="color: #94a3b8; margin-bottom: 20px;">
        <i data-lucide="download"></i> EXPORTAR RELATÓRIO (CSV)
    </button>

    <div class="form">
        <select id="sel-cliente"></select>
        <select id="tipo">
            <option value="venda">📦 VENDA DE PEÇAS</option>
            <option value="servico">🔧 SERVIÇO TÉCNICO</option>
        </select>
        <input type="text" id="desc" placeholder="DESCRIÇÃO">
        <div style="display:flex; gap:8px">
            <input type="number" id="venda" placeholder="PREÇO">
            <input type="number" id="custo" placeholder="CUSTO">
        </div>
        <select id="pagamento">
            <option value="PIX">PIX</option><option value="DINHEIRO">DINHEIRO</option>
            <option value="CARTÃO">CARTÃO</option>
        </select>
        <button class="btn" onclick="registrar()">SALVAR REGISTRO</button>
    </div>

    <div class="tabs">
        <div id="tab-v" class="tab active-v" onclick="mudarAba('venda')">PEÇAS</div>
        <div id="tab-s" class="tab" onclick="mudarAba('servico')">SERVIÇOS</div>
    </div>
    <div id="lista"></div>
</div>

<div id="modalClientes" class="modal">
    <div class="modal-content">
        <h3>CADASTRO</h3>
        <input type="text" id="c-nome" placeholder="RESPONSÁVEL">
        <input type="text" id="c-fant" placeholder="EMPRESA / FANTASIA">
        <input type="text" id="c-tel" placeholder="TELEFONE">
        <button class="btn" style="background: var(--green); margin-top: 10px;" onclick="salvarCli()">CADASTRAR</button>
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0">
        <div id="lista-cli" style="max-height:200px; overflow-y:auto"></div>
        <button class="btn btn-outline" style="margin-top:10px" onclick="fecharClientes()">FECHAR</button>
    </div>
</div>

<script>
    lucide.createIcons();
    let dados = JSON.parse(localStorage.getItem("F2_DATA")) || [];
    let clientes = JSON.parse(localStorage.getItem("F2_CLI")) || [];
    let periodo = 'dia', aba = 'venda';
    let chartInstance = null;

    function fmt(v) { return "R$ " + v.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

    // --- FUNÇÕES DE RELATÓRIO ---
    function renderizarGrafico(vendas, servicos) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['PEÇAS', 'SERVIÇOS'],
                datasets: [{
                    data: [vendas, servicos],
                    backgroundColor: ['#10b981', '#8b5cf6'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#f8fafc', font: { size: 10 } } }
                },
                cutout: '70%'
            }
        });
    }

    function exportarCSV() {
        if (dados.length === 0) return alert("SEM DADOS");
        let csv = "\ufeffDATA;CLIENTE;TIPO;DESCRICAO;VALOR;CUSTO;LUCRO;PAGAMENTO\n";
        dados.forEach(i => {
            const d = new Date(i.ts).toLocaleDateString('pt-BR');
            csv += `${d};${i.cli};${i.tipo};${i.desc};${i.venda};${i.custo};${i.venda-i.custo};${i.pag}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `F2_RELATORIO_${new Date().toLocaleDateString()}.csv`);
        link.click();
    }

    // --- GESTÃO DE CLIENTES ---
    function abrirClientes() { document.getElementById('modalClientes').style.display='block'; listarCli(); }
    function fecharClientes() { document.getElementById('modalClientes').style.display='none'; }

    function salvarCli() {
        const n = document.getElementById('c-nome').value.toUpperCase();
        const f = document.getElementById('c-fant').value.toUpperCase();
        if(!n) return alert("NOME OBRIGATÓRIO");
        clientes.push({ nome: n, fantasia: f, tel: document.getElementById('c-tel').value });
        localStorage.setItem("F2_CLI", JSON.stringify(clientes));
        listarCli(); atualizarSel();
    }

    function listarCli() {
        const d = document.getElementById('lista-cli'); d.innerHTML = "";
        clientes.forEach((c, i) => {
            d.innerHTML += `<div class="item"><div><b>${c.fantasia || c.nome}</b></div><button class="btn-del" onclick="delCli(${i})">X</button></div>`;
        });
    }

    function delCli(i) { clientes.splice(i, 1); localStorage.setItem("F2_CLI", JSON.stringify(clientes)); listarCli(); atualizarSel(); }

    function atualizarSel() {
        const s = document.getElementById('sel-cliente');
        s.innerHTML = '<option value="AVULSO">👤 CLIENTE AVULSO</option>';
        clientes.forEach(c => s.innerHTML += `<option value="${c.fantasia || c.nome}">${c.fantasia || c.nome}</option>`);
    }

    // --- CORE ---
    function registrar() {
        const v = parseFloat(document.getElementById('venda').value) || 0;
        const c = parseFloat(document.getElementById('custo').value) || 0;
        const d = document.getElementById('desc').value.toUpperCase();
        if(!d || v === 0) return alert("PREENCHA TUDO");
        dados.push({
            cli: document.getElementById('sel-cliente').value,
            tipo: document.getElementById('tipo').value,
            desc: d, venda: v, custo: c,
            pag: document.getElementById('pagamento').value,
            ts: Date.now()
        });
        localStorage.setItem("F2_DATA", JSON.stringify(dados));
        document.getElementById('desc').value = ""; document.getElementById('venda').value = ""; document.getElementById('custo').value = "";
        atualizarTudo();
    }

    function atualizarTudo() {
        const agora = new Date();
        let vb=0, sb=0, luc=0;

        dados.forEach(i => {
            const d = new Date(i.ts);
            let ok = false;
            
            const isMes = d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
            const isDia = d.toDateString() === agora.toDateString();

            if(periodo === 'dia' && isDia) ok = true;
            else if(periodo === 'mes' && isMes) ok = true;

            if(ok) {
                if(i.tipo === 'venda') vb += i.venda; else sb += i.venda;
                luc += (i.venda - i.custo);
            }
        });

        document.getElementById('rel-v-bruto').innerText = fmt(vb);
        document.getElementById('rel-s-bruto').innerText = fmt(sb);
        document.getElementById('rel-lucro').innerText = fmt(luc);
        
        renderizarGrafico(vb, sb);

        const l = document.getElementById('lista'); l.innerHTML = "";
        dados.filter(i => i.tipo === aba).reverse().slice(0, 15).forEach(i => {
            l.innerHTML += `<div class="item" style="border-left-color:${aba === 'venda' ? 'var(--green)' : 'var(--purple)'}">
                <div class="item-info"><b>${i.cli}</b><small>${i.desc}</small><b>${fmt(i.venda)}</b></div>
                <button class="btn-del" onclick="delVenda(${dados.indexOf(i)})">X</button>
            </div>`;
        });
    }

    function delVenda(i) { if(confirm("EXCLUIR?")) { dados.splice(i, 1); localStorage.setItem("F2_DATA", JSON.stringify(dados)); atualizarTudo(); } }
    
    function mudarAba(t) { 
        aba = t; 
        document.getElementById('tab-v').className = 'tab'+(t==='venda'?' active-v':''); 
        document.getElementById('tab-s').className = 'tab'+(t==='servico'?' active-s':''); 
        atualizarTudo(); 
    }

    function setPeriodo(p, btn) { 
        periodo = p; 
        document.getElementById('label-periodo').innerText = `LUCRO LÍQUIDO (${p === 'dia' ? 'HOJE' : 'MÊS'})`;
        document.getElementById('btn-dia').style.opacity = p === 'dia' ? "1" : "0.6";
        document.getElementById('btn-mes').style.opacity = p === 'mes' ? "1" : "0.6";
        document.getElementById('btn-dia').style.color = p === 'dia' ? "var(--green)" : "white";
        document.getElementById('btn-mes').style.color = p === 'mes' ? "var(--green)" : "white";
        atualizarTudo(); 
    }

    atualizarSel(); atualizarTudo();
</script>
</body>
</html>
