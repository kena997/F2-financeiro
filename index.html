<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F2 GESTÃO PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --product: #10b981; 
            --service: #8b5cf6; --danger: #f43f5e; --bg: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); 
            margin: 0; padding: 15px; color: #334155; text-transform: uppercase;
        }
        .container { max-width: 480px; margin: auto; }
        
        /* Header & Logo */
        .brand { text-align: center; margin-bottom: 25px; padding: 10px; }
        .brand img { max-width: 150px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08)); }

        /* Dashboard Cards */
        .card { 
            background: white; padding: 20px; border-radius: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 15px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .chart-box { height: 180px; margin-bottom: 10px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { 
            background: white; padding: 15px; border-radius: 20px; 
            border: 1px solid #f1f5f9; text-align: center;
        }
        .stat-card small { font-size: 9px; color: #64748b; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 14px; color: var(--primary); }

        /* Filters */
        .filter-bar { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter { 
            background: white; border: 1px solid #e2e8f0; padding: 8px 15px; 
            border-radius: 12px; font-size: 10px; font-weight: 700; cursor: pointer; color: #64748b;
        }
        .btn-filter.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Inputs Modernos */
        .form-group { background: #f1f5f9; padding: 20px; border-radius: 24px; margin-bottom: 20px; }
        input, select { 
            width: 100%; padding: 14px; margin: 5px 0; border: 1px solid #e2e8f0; 
            border-radius: 14px; font-size: 13px; font-family: inherit; font-weight: 600;
        }
        .btn-main { 
            background: var(--accent); color: white; border: none; width: 100%; 
            padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }

        /* Modal / Sheet */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); 
            backdrop-filter: blur(8px); z-index: 100; 
        }
        .modal-content { 
            background: white; position: absolute; bottom: 0; width: 100%; 
            border-radius: 30px 30px 0 0; padding: 30px 20px; max-height: 90vh; overflow-y: auto;
        }

        /* Tabs & List */
        .tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 16px; margin-bottom: 15px; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; border-radius: 12px; 
            font-size: 11px; font-weight: 800; cursor: pointer; color: #64748b;
        }
        .tab.active-p { background: var(--product); color: white; }
        .tab.active-s { background: var(--service); color: white; }

        .item { 
            background: white; padding: 16px; border-radius: 20px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .btn-del { background: #fee2e2; color: var(--danger); border: none; padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <img src="Logo_Kena.png" alt="F2">
    </div>

    <div class="card">
        <div class="chart-box"><canvas id="graficoF2"></canvas></div>
    </div>

    <div class="filter-bar">
        <button class="btn-filter active" onclick="setPeriodo('dia', this)">HOJE</button>
        <button class="btn-filter" onclick="setPeriodo('semana', this)">7 DIAS</button>
        <button class="btn-filter" onclick="setPeriodo('mes', this)">ESTE MÊS</button>
        <button class="btn-filter" onclick="setPeriodo('ano', this)">ESTE ANO</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="grid-column: span 2; background: var(--primary); color: white;">
            <small style="color: #94a3b8">LUCRO ESTIMADO</small>
            <b id="rel-lucro" style="font-size: 24px; color: #10b981;">R$ 0,00</b>
        </div>
        <div class="stat-card">
            <small>PEÇAS</small>
            <b id="rel-v-bruto" style="color: var(--product)">R$ 0,00</b>
        </div>
        <div class="stat-card">
            <small>SERVIÇOS</small>
            <b id="rel-s-bruto" style="color: var(--service)">R$ 0,00</b>
        </div>
    </div>

    <button class="btn-main" style="background: var(--primary); margin-bottom: 20px;" onclick="abrirClientes()">
        <i data-lucide="users"></i> GERENCIAR CLIENTES
    </button>

    <div class="form-group">
        <h3 style="margin: 0 0 15px 0; font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="plus-circle" style="width:18px"></i> NOVO LANÇAMENTO
        </h3>
        <select id="sel-cliente"></select>
        <select id="tipo">
            <option value="venda">📦 VENDA DE PEÇAS</option>
            <option value="servico">🔧 SERVIÇO TÉCNICO</option>
        </select>
        <input type="text" id="desc" placeholder="DESCRIÇÃO DO SERVIÇO/PRODUTO">
        <div style="display:flex; gap:8px">
            <input type="number" id="venda" placeholder="PREÇO R$">
            <input type="number" id="custo" placeholder="CUSTO R$">
        </div>
        <select id="pagamento">
            <option value="PIX">⚡ PIX</option>
            <option value="DINHEIRO">💵 DINHEIRO</option>
            <option value="C. CRÉDITO">💳 CARTÃO CRÉDITO</option>
            <option value="C. DÉBITO">💳 CARTÃO DÉBITO</option>
        </select>
        <button class="btn-main" onclick="registrarVenda()">
            <i data-lucide="check-circle"></i> SALVAR NO HISTÓRICO
        </button>
    </div>

    <div class="tabs">
        <div id="tab-v" class="tab active-p" onclick="mudarAba('venda')">PEÇAS</div>
        <div id="tab-s" class="tab" onclick="mudarAba('servico')">SERVIÇOS</div>
    </div>
    <div id="lista"></div>
</div>

<div id="modalClientes" class="modal">
    <div class="modal-content">
        <div style="width: 40px; height: 4px; background: #e2e8f0; margin: -10px auto 20px; border-radius: 10px;"></div>
        <h2 style="margin: 0 0 20px 0; font-size: 18px;">CADASTRO DE CLIENTES</h2>
        <input type="text" id="cad-nome" placeholder="NOME DO CLIENTE">
        <input type="text" id="cad-fantasia" placeholder="NOME DA EMPRESA (OPCIONAL)">
        <input type="text" id="cad-doc" placeholder="CPF OU CNPJ">
        <input type="text" id="cad-tel" placeholder="TELEFONE">
        <input type="text" id="cad-end" placeholder="ENDEREÇO">
        <button class="btn-main" style="background: var(--product)" onclick="salvarCliente()">CADASTRAR</button>
        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">
        <div id="lista-clientes-cadastrados" style="max-height: 250px; overflow-y:auto"></div>
        <button class="btn-main" style="background: #64748b; margin-top: 10px;" onclick="fecharClientes()">FECHAR</button>
    </div>
</div>

<script>
    lucide.createIcons();
    const CHAVE_VENDAS = "F2_PRO_V1", CHAVE_CLIENTES = "F2_CLIENTES";
    let dadosVendas = JSON.parse(localStorage.getItem(CHAVE_VENDAS)) || [];
    let dadosClientes = JSON.parse(localStorage.getItem(CHAVE_CLIENTES)) || [];
    let periodoAtual = 'dia', abaAtual = 'venda', meuGrafico = null;

    function fmt(v) { return "R$ " + v.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

    // Funções de Modal e Cliente
    function abrirClientes() { document.getElementById('modalClientes').style.display = 'block'; listarClientes(); }
    function fecharClientes() { document.getElementById('modalClientes').style.display = 'none'; }
    
    function salvarCliente() {
        const c = {
            nome: document.getElementById('cad-nome').value.toUpperCase(),
            fantasia: document.getElementById('cad-fantasia').value.toUpperCase(),
            doc: document.getElementById('cad-doc').value,
            tel: document.getElementById('cad-tel').value,
            end: document.getElementById('cad-end').value.toUpperCase()
        };
        if(!c.nome) return alert("NOME É OBRIGATÓRIO");
        dadosClientes.push(c);
        localStorage.setItem(CHAVE_CLIENTES, JSON.stringify(dadosClientes));
        ["cad-nome", "cad-fantasia", "cad-doc", "cad-tel", "cad-end"].forEach(id => document.getElementById(id).value = "");
        listarClientes(); atualizarSelectClientes();
    }

    function listarClientes() {
        const div = document.getElementById('lista-clientes-cadastrados');
        div.innerHTML = "";
        dadosClientes.forEach((c, i) => {
            div.innerHTML += `<div class="item">
                <div style="font-size:11px"><b>${c.fantasia || c.nome}</b><br><small>${c.tel}</small></div>
                <button onclick="removerCliente(${i})" class="btn-del"><i data-lucide="trash-2" style="width:16px"></i></button>
            </div>`;
        });
        lucide.createIcons();
    }

    function removerCliente(i) { if(confirm("EXCLUIR?")) { dadosClientes.splice(i, 1); localStorage.setItem(CHAVE_CLIENTES, JSON.stringify(dadosClientes)); listarClientes(); atualizarSelectClientes(); } }

    function atualizarSelectClientes() {
        const sel = document.getElementById('sel-cliente');
        sel.innerHTML = '<option value="AVULSO">👤 CLIENTE AVULSO</option>';
        dadosClientes.sort((a,b) => (a.fantasia || a.nome).localeCompare(b.fantasia || b.nome)).forEach(c => {
            sel.innerHTML += `<option value="${c.fantasia || c.nome}">${c.fantasia || c.nome}</option>`;
        });
    }

    // Funções de Venda e Gráfico
    function registrarVenda() {
        const item = {
            cliente: document.getElementById('sel-cliente').value,
            tipo: document.getElementById('tipo').value,
            desc: document.getElementById('desc').value.toUpperCase(),
            venda: parseFloat(document.getElementById('venda').value) || 0,
            custo: parseFloat(document.getElementById('custo').value) || 0,
            pag: document.getElementById('pagamento').value,
            ts: Date.now()
        };
        if(!item.desc || item.venda === 0) return alert("ERRO: DADOS INCOMPLETOS");
        dadosVendas.push(item);
        localStorage.setItem(CHAVE_VENDAS, JSON.stringify(dadosVendas));
        ["desc", "venda", "custo"].forEach(id => document.getElementById(id).value = "");
        atualizarTudo();
    }

    function inicializarGrafico(v, s) {
        const ctx = document.getElementById('graficoF2').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['PEÇAS', 'SERVIÇOS'],
                datasets: [{ data: [v, s], backgroundColor: ['#10b981', '#8b5cf6'], borderWidth: 0, cutout: '75%' }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { weight: 'bold' } } } } }
        });
    }

    function atualizarTudo() {
        const agora = new Date();
        let vB = 0, sB = 0, lucro = 0;
        dadosVendas.forEach(item => {
            const d = new Date(item.ts);
            let inc = false;
            if (periodoAtual === 'dia' && d.toDateString() === agora.toDateString()) inc = true;
            else if (periodoAtual === 'semana' && item.ts > (agora - 7*24*60*60*1000)) inc = true;
            else if (periodoAtual === 'mes' && d.getMonth() === agora.getMonth()) inc = true;
            else if (periodoAtual === 'ano' && d.getFullYear() === agora.getFullYear()) inc = true;
            if (inc) {
                if (item.tipo === 'venda') vB += item.venda; else sB += item.venda;
                lucro += (item.venda - item.custo);
            }
        });

        document.getElementById('rel-v-bruto').innerText = fmt(vB);
        document.getElementById('rel-s-bruto').innerText = fmt(sB);
        document.getElementById('rel-lucro').innerText = fmt(lucro);
        inicializarGrafico(vB, sB);

        const lista = document.getElementById('lista');
        lista.innerHTML = "";
        dadosVendas.filter(i => i.tipo === abaAtual).reverse().slice(0, 15).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div><b style="color:var(--primary)">${item.cliente}</b><br><small>${item.desc}</small><br><b>${fmt(item.venda)}</b></div>
                <button onclick="removerVenda(${dadosVendas.indexOf(item)})" class="btn-del"><i data-lucide="trash-2" style="width:16px"></i></button>`;
            lista.appendChild(div);
        });
        lucide.createIcons();
    }

    function removerVenda(i) { if(confirm("REMOVER?")) { dadosVendas.splice(i, 1); localStorage.setItem(CHAVE_VENDAS, JSON.stringify(dadosVendas)); atualizarTudo(); } }
    function setPeriodo(p, el) { periodoAtual = p; document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active')); el.classList.add('active'); atualizarTudo(); }
    function mudarAba(t) { abaAtual = t; atualizarTudo(); }

    atualizarSelectClientes(); atualizarTudo();
</script>
</body>
</html>
